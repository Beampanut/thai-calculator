<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- ตั้งค่า Viewport ให้รองรับ Mobile-first -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คำนวณไทยช่วยไทย 60/40</title>
    
    <!-- นำเข้าฟอนต์ Kanit จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- ================= CSS ================= -->
    <style>
        /* ตั้งค่าตัวแปรสีสำหรับ Light Mode (โทนสว่าง สบายตา) */
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-sub: #64748b;
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
            --accent-user: #fb7185; /* สีชมพูอมแดงน่ารักๆ สำหรับเราจ่าย */
            --accent-gov: #38bdf8;  /* สีฟ้าสดใส สำหรับรัฐจ่าย */
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --radius: 24px;
        }

        /* ตั้งค่าตัวแปรสีสำหรับ Dark Mode (โทนมืด ไม่แสบตา) */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
            --accent-user: #f43f5e;
            --accent-gov: #0ea5e9;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* รีเซ็ตค่าเริ่มต้นและฟอนต์ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* คอนเทนเนอร์หลักของแอป (รองรับจอเล็ก 320px) */
        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px; /* ขนาดจำลองเหมือนเปิดแอปในมือถือ */
            padding: 2rem 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: relative;
        }

        /* ส่วนหัวและปุ่มเปลี่ยนธีม */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: 50%;
        }

        /* กล่องกรอกข้อมูล */
        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 0.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            font-size: 1.5rem;
            text-align: right;
            border: 2px solid var(--input-border);
            border-radius: 16px;
            background-color: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-gov);
        }

        /* กล่องแสดงผลลัพธ์ */
        .result-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-box {
            padding: 1.25rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-box.user {
            background-color: rgba(251, 113, 133, 0.1);
            border: 1px solid rgba(251, 113, 133, 0.2);
        }
        [data-theme="dark"] .result-box.user {
            background-color: rgba(244, 63, 94, 0.15);
            border-color: rgba(244, 63, 94, 0.3);
        }

        .result-box.gov {
            background-color: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        [data-theme="dark"] .result-box.gov {
            background-color: rgba(14, 165, 233, 0.15);
            border-color: rgba(14, 165, 233, 0.3);
        }

        .result-label {
            font-size: 1rem;
            font-weight: 500;
        }

        .result-box.user .result-label { color: var(--accent-user); }
        .result-box.gov .result-label { color: var(--accent-gov); }

        .result-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .result-box.user .result-value { color: var(--accent-user); }
        .result-box.gov .result-value { color: var(--accent-gov); }

        .unit {
            font-size: 0.9rem;
            font-weight: 400;
            margin-left: 0.25rem;
        }

        /* ปรับให้เล็กลงอีกนิดสำหรับ iPhone 5s (width: 320px) */
        @media (max-width: 360px) {
            .app-container {
                padding: 1.5rem 1rem;
            }
            .result-value {
                font-size: 1.25rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ================= HTML ================= -->
    <div class="app-container ">
        <div class="header">
            <h1>🇹🇭 ไทยช่วยไทย (60/40)</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="เปลี่ยนธีม">🌙</button>
        </div>

        <div class="input-group">
            <label for="totalAmount">ยอดราคาสินค้ารวม (บาท)</label>
            <input type="number" id="totalAmount" placeholder="0.00" inputmode="decimal">
        </div>

        <div class="result-container">
            <div class="result-box user">
                <div class="result-label">เราจ่ายเอง (40%)</div>
                <div class="result-value"><span id="userPay">0.00</span><span class="unit">฿</span></div>
            </div>
            
            <div class="result-box gov">
                <div class="result-label">รัฐออกให้ (60%)</div>
                <div class="result-value"><span id="govPay">0.00</span><span class="unit">฿</span></div>
            </div>
        </div>
    </div>

    <!-- ================= JavaScript ================= -->
    <script>
        // ฟังก์ชันคำนวณแบบ Real-time
        const totalAmountInput = document.getElementById('totalAmount');
        const userPayText = document.getElementById('userPay');
        const govPayText = document.getElementById('govPay');

        totalAmountInput.addEventListener('input', function() {
            let total = parseFloat(this.value);
            
            if (isNaN(total) || total < 0) {
                userPayText.textContent = "0.00";
                govPayText.textContent = "0.00";
                return;
            }

            // คำนวณ 40% และ 60%
            let userPay = total * 0.40;
            let govPay = total * 0.60;

            // จัดรูปแบบตัวเลขให้มีทศนิยม 2 ตำแหน่งและมีลูกน้ำ (Comma)
            userPayText.textContent = userPay.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            govPayText.textContent = govPay.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        });

        // ฟังก์ชันสลับ Dark Mode / Light Mode
        const themeToggleBtn = document.getElementById('themeToggle');
        let isDarkMode = false;

        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggleBtn.textContent = '☀️'; // เปลี่ยนไอคอนเป็นพระอาทิตย์
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggleBtn.textContent = '🌙'; // เปลี่ยนไอคอนเป็นพระจันทร์
            }
        });
    </script>
</body>
</html>
